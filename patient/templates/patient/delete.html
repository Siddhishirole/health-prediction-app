{% extends 'patient/base.html' %}

{% block content %}

<div class="card">

    <div class="card-header bg-danger text-white">
        Delete Patient
    </div>

    <div class="card-body">

        <p>
            Are you sure you want to delete
            {{ patient.full_name }} ?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button type="submit"
                    class="btn btn-danger">
                Delete
            </button>

            <a href="/"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
