{% extends 'patient/base.html' %}

{% block content %}

<div class="card">

    <div class="card-header bg-success text-white">
        <h4>Patient Form</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">
                Save
            </button>

            <a href="/"
               class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
